 # SentinelAI Backend ? loads profile-specific config on top
spring.profiles.active=dev
server.port=8090
spring.main.web-application-type=servlet

# LLM
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.stream=false

# OpenAI (add your API key here)
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4
spring.ai.openai.chat.options.temperature=0.3
spring.ai.openai.chat.options.stream=false

# Anthropic/Claude (add your API key here)
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-3-sonnet-20240229
spring.ai.anthropic.chat.options.temperature=0.3
spring.ai.anthropic.chat.options.stream=false

# Google Vertex AI Gemini (add your project ID and location here)
spring.ai.vertex.ai.gemini.project-id=${VERTEX_AI_PROJECT_ID:}
spring.ai.vertex.ai.gemini.location=${VERTEX_AI_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-pro
spring.ai.vertex.ai.gemini.chat.options.temperature=0.3
spring.ai.vertex.ai.gemini.chat.options.stream=false

# SquadOS
squad.name=sentinel-squad
squad.llm.provider=${LLM_PROVIDER:ollama}
squad.llm.model=llama3.2
squad.tracing.enabled=true
squad.tracing.exporter=memory
squad.security.enabled=false
squad.approval.enabled=true

# SentinelAI
sentinel.handle=${SENTINEL_HANDLE:@YourHandleName}
sentinel.polling.interval-ms=30000
sentinel.mock.enabled=true
sentinel.auto-reply.enabled=true
sentinel.auto-reply.require-approval=true
sentinel.ticket.system=MOCK
sentinel.brand.name=${SENTINEL_BRAND_NAME:Your Brand Name}
sentinel.brand.tone=professional,empathetic,solution-focused
sentinel.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT
sentinel.jwt.secret=SentinelAI-Secret-Key-Min-256-Bits-For-HS256-Algorithm-2024
sentinel.jwt.expiry-ms=86400000

# Twitter API v2 (set in prod or .env)
sentinel.twitter.bearer-token=
sentinel.twitter.enabled=false

# Facebook Graph API
sentinel.facebook.app-id=
sentinel.facebook.app-secret=
sentinel.facebook.access-token=
sentinel.facebook.enabled=false

# Instagram Basic Display API (via Facebook)
sentinel.instagram.access-token=
sentinel.instagram.enabled=false

# LinkedIn API
sentinel.linkedin.client-id=
sentinel.linkedin.client-secret=
sentinel.linkedin.access-token=
sentinel.linkedin.enabled=false

# Zendesk connector (set enabled=true + credentials to activate)
sentinel.zendesk.subdomain=
sentinel.zendesk.email=
sentinel.zendesk.api-token=
sentinel.zendesk.enabled=false

# Jira connector
sentinel.jira.url=
sentinel.jira.email=
sentinel.jira.api-token=
sentinel.jira.project-key=SENT
sentinel.jira.enabled=false

# Separate Flyway location to avoid clash with squad-core migrations
spring.flyway.locations=classpath:db/sentinel
